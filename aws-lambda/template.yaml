AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  MOTCO Notification Service - AWS Lambda Migration
  Replaces legacy on-premise Express.js notification service with serverless
  architecture using API Gateway, Lambda, SNS, SQS, and DynamoDB.

Globals:
  Function:
    Runtime: nodejs18.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        EVENTS_TABLE: !Ref EventsTable
        SUBSCRIBERS_TABLE: !Ref SubscribersTable
        SNS_TOPIC_ARN_PREFIX: !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:motco-'
        ENVIRONMENT: !Ref Environment
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

Resources:
  # ============================================================
  # API GATEWAY
  # ============================================================
  MotcoApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub 'motco-notification-api-${Environment}'
      StageName: !Ref Environment
      Description: MOTCO Notification Service API Gateway
      Cors:
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
        AllowOrigin: "'*'"

  # ============================================================
  # DYNAMODB TABLES
  # ============================================================
  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'motco-events-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: type
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
        - AttributeName: tcn
          AttributeType: S
      KeySchema:
        - AttributeName: eventId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: type-createdAt-index
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: tcn-index
          KeySchema:
            - AttributeName: tcn
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  SubscribersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'motco-subscribers-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: subscriberId
          AttributeType: S
      KeySchema:
        - AttributeName: subscriberId
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # ============================================================
  # SNS TOPICS (one per notification type)
  # ============================================================
  ManifestReadyTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'motco-MANIFEST_READY-${Environment}'
      DisplayName: MOTCO Manifest Ready Notifications

  ShipmentDepartedTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'motco-SHIPMENT_DEPARTED-${Environment}'
      DisplayName: MOTCO Shipment Departed Notifications

  ShipmentDelayedTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'motco-SHIPMENT_DELAYED-${Environment}'
      DisplayName: MOTCO Shipment Delayed Notifications

  RfidScanEventTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'motco-RFID_SCAN_EVENT-${Environment}'
      DisplayName: MOTCO RFID Scan Event Notifications

  SustainmentRequestTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'motco-SUSTAINMENT_REQUEST-${Environment}'
      DisplayName: MOTCO Sustainment Request Notifications

  DiversionAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'motco-DIVERSION_ALERT-${Environment}'
      DisplayName: MOTCO Diversion Alert Notifications

  # ============================================================
  # SQS QUEUES + DLQs (one per downstream system)
  # ============================================================

  # --- GATES ---
  GatesDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'motco-gates-dlq-${Environment}'
      MessageRetentionPeriod: 1209600

  GatesQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'motco-gates-${Environment}'
      VisibilityTimeout: 60
      MessageRetentionPeriod: 1209600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt GatesDeadLetterQueue.Arn
        maxReceiveCount: 3

  GatesQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [!Ref GatesQueue]
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: sqs:SendMessage
            Resource: !GetAtt GatesQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:motco-*'

  GatesManifestReadySubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref ManifestReadyTopic
      Protocol: sqs
      Endpoint: !GetAtt GatesQueue.Arn
      RawMessageDelivery: false

  GatesDiversionAlertSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref DiversionAlertTopic

  # ============================================================
  # CLOUDWATCH ALARMS (DLQ Depth Monitoring)
  # ============================================================
  GatesDlqAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'motco-gates-dlq-depth-${Environment}'
      AlarmDescription: GATES dead letter queue has messages — deliveries permanently failing
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt GatesDeadLetterQueue.QueueName


  # ============================================================
  # LAMBDA FUNCTIONS
  # ============================================================

  # --- Event Ingestion ---
  EventIngestionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'motco-event-ingestion-${Environment}'
      Handler: src/functions/eventIngestion/index.handler
      CodeUri: .
      Description: Receives events via API Gateway, stores in DynamoDB, publishes to SNS
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
        - SNSPublishMessagePolicy:
            TopicName: !Sub 'motco-*-${Environment}'
        - Statement:
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:motco-*'
      Events:
        PostEvent:
          Type: Api
          Properties:
            RestApiId: !Ref MotcoApi
            Path: /api/events
            Method: post

  # --- Event Query ---
  EventQueryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'motco-event-query-${Environment}'
      Handler: src/functions/eventQuery/index.handler
      CodeUri: .
      Description: Handles GET requests for event retrieval and listing
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventsTable
      Events:
        GetEvent:
          Type: Api
          Properties:
            RestApiId: !Ref MotcoApi
            Path: /api/events/{id}
            Method: get
        ListEvents:
          Type: Api
          Properties:
            RestApiId: !Ref MotcoApi
            Path: /api/events
            Method: get

  # --- Event Retry ---
  EventRetryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'motco-event-retry-${Environment}'
      Handler: src/functions/eventRetry/index.handler
      CodeUri: .
      Description: Republishes failed events to SNS for redelivery
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
        - Statement:
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:motco-*'
      Events:
        RetryEvent:
          Type: Api
          Properties:
            RestApiId: !Ref MotcoApi
            Path: /api/events/{id}/retry
            Method: post

  # --- Subscriber Management ---
  SubscriberManagementFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'motco-subscriber-mgmt-${Environment}'
      Handler: src/functions/subscriberManagement/index.handler
      CodeUri: .
      Description: Manages subscriber registration and removal in DynamoDB
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SubscribersTable
      Events:
        Subscribe:
          Type: Api
          Properties:
            RestApiId: !Ref MotcoApi
            Path: /api/subscribe
            Method: post
        Unsubscribe:
          Type: Api
          Properties:
            RestApiId: !Ref MotcoApi
            Path: /api/subscribe/{subscriberId}
            Method: delete
        ListSubscribers:
          Type: Api
          Properties:
            RestApiId: !Ref MotcoApi
            Path: /api/subscribe
            Method: get

  # --- Health Check ---
  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'motco-health-${Environment}'
      Handler: src/functions/health/index.handler
      CodeUri: .
      Description: Health check endpoint
      Events:
        Health:
          Type: Api
          Properties:
            RestApiId: !Ref MotcoApi
            Path: /api/health
            Method: get

  # --- Delivery Processor (one per downstream system) ---
  GatesDeliveryProcessor:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'motco-delivery-gates-${Environment}'
      Handler: src/functions/deliveryProcessor/index.handler
      CodeUri: .
      Description: Processes SQS messages for GATES delivery
      Environment:
        Variables:
          TARGET_SYSTEM: GATES
          TARGET_ENDPOINT: ''
          DELIVERY_TIMEOUT: '30000'
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt GatesQueue.Arn
            BatchSize: 1

